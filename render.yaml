services:
  # Web Service
  - type: web
    name: bid2code
    env: node
    region: oregon
    plan: starter
    buildCommand: npm install
    startCommand: node server/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_NAME
        value: Administrator
