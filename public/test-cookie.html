<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cookie Test - Bid2Code</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .test-section {
            border: 2px solid #ddd;
            padding: 15px;
            margin: 20px 0;
            border-radius: 8px;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
        }
        button:hover {
            background: #0056b3;
        }
        pre {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
        }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>🍪 Cookie & Session Test</h1>
    
    <div class="test-section">
        <h2>Step 1: Login as Admin</h2>
        <input type="text" id="username" placeholder="Username" value="msec" style="padding: 8px; margin: 5px;">
        <input type="password" id="password" placeholder="Password" value="Msec@123" style="padding: 8px; margin: 5px;">
        <br>
        <button onclick="testLogin()">Test Admin Login</button>
        <div id="loginResult"></div>
    </div>

    <div class="test-section">
        <h2>Step 2: Check Cookies</h2>
        <button onclick="checkCookies()">Check Browser Cookies</button>
        <div id="cookieResult"></div>
    </div>

    <div class="test-section">
        <h2>Step 3: Check Server Session</h2>
        <button onclick="checkSession()">Check Server Session (/debug/session)</button>
        <div id="sessionResult"></div>
    </div>

    <div class="test-section">
        <h2>Step 4: Check Auth Status</h2>
        <button onclick="checkAuth()">Check Auth (/api/auth/me)</button>
        <div id="authResult"></div>
    </div>

    <div class="test-section">
        <h2>Console Logs</h2>
        <pre id="consoleLogs" style="max-height: 400px; overflow-y: auto;"></pre>
    </div>

    <script>
        let logs = [];
        
        // Override console.log to capture logs
        const originalLog = console.log;
        function log(message, data = null) {
            const timestamp = new Date().toLocaleTimeString();
            const logMessage = `[${timestamp}] ${message}`;
            logs.push(logMessage);
            if (data) {
                logs.push(JSON.stringify(data, null, 2));
            }
            originalLog.apply(console, arguments);
            document.getElementById('consoleLogs').innerHTML = logs.join('\n');
        }

        async function testLogin() {
            try {
                log('🔄 Attempting admin login...');
                const username = document.getElementById('username').value;
                const password = document.getElementById('password').value;
                
                const response = await fetch('/api/auth/admin/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include',
                    body: JSON.stringify({ username, password })
                });
                
                log(`Response status: ${response.status}`);
                const data = await response.json();
                log('Response data:', data);
                
                if (response.ok) {
                    document.getElementById('loginResult').innerHTML = 
                        '<p class="success">✓ Login successful!</p>';
                    log('✓ Admin login successful');
                } else {
                    document.getElementById('loginResult').innerHTML = 
                        `<p class="error">✗ Login failed: ${data.error}</p>`;
                    log('✗ Login failed:', data.error);
                }
            } catch (error) {
                log('✗ Login error:', error.message);
                document.getElementById('loginResult').innerHTML = 
                    `<p class="error">✗ Error: ${error.message}</p>`;
            }
        }

        function checkCookies() {
            log('🍪 Checking cookies...');
            const cookies = document.cookie.split(';').map(c => c.trim());
            log('All cookies:', cookies);
            
            const b2cCookie = cookies.find(c => c.startsWith('b2c.sid='));
            if (b2cCookie) {
                document.getElementById('cookieResult').innerHTML = 
                    `<p class="success">✓ Found b2c.sid cookie: ${b2cCookie.substring(0, 50)}...</p>`;
                log('✓ b2c.sid cookie found');
            } else {
                document.getElementById('cookieResult').innerHTML = 
                    '<p class="error">✗ No b2c.sid cookie found!</p>';
                log('✗ No b2c.sid cookie found');
            }
        }

        async function checkSession() {
            try {
                log('🔍 Checking server session...');
                const response = await fetch('/debug/session', {
                    credentials: 'include'
                });
                
                log(`Session check status: ${response.status}`);
                const data = await response.json();
                log('Session data:', data);
                
                if (data.isAdmin) {
                    document.getElementById('sessionResult').innerHTML = 
                        '<p class="success">✓ Server session shows admin logged in!</p>';
                    log('✓ Server confirms admin session');
                } else {
                    document.getElementById('sessionResult').innerHTML = 
                        '<p class="error">✗ Server session does not show admin login</p>';
                    log('✗ Server session not authenticated');
                }
            } catch (error) {
                log('✗ Session check error:', error.message);
                document.getElementById('sessionResult').innerHTML = 
                    `<p class="error">✗ Error: ${error.message}</p>`;
            }
        }

        async function checkAuth() {
            try {
                log('🔐 Checking auth status...');
                const response = await fetch('/api/auth/me', {
                    credentials: 'include'
                });
                
                log(`Auth check status: ${response.status}`);
                const data = await response.json();
                log('Auth data:', data);
                
                if (response.ok && data.userType === 'admin') {
                    document.getElementById('authResult').innerHTML = 
                        '<p class="success">✓ Auth endpoint confirms admin is logged in!</p>';
                    log('✓ Auth endpoint confirms admin session');
                    
                    // Test redirect to dashboard
                    setTimeout(() => {
                        log('🚀 Redirecting to /admin/dashboard in 3 seconds...');
                        setTimeout(() => {
                            window.location.href = '/admin/dashboard';
                        }, 3000);
                    }, 500);
                } else {
                    document.getElementById('authResult').innerHTML = 
                        `<p class="error">✗ Auth check failed: ${data.error || 'Not authenticated'}</p>`;
                    log('✗ Auth check failed');
                }
            } catch (error) {
                log('✗ Auth check error:', error.message);
                document.getElementById('authResult').innerHTML = 
                    `<p class="error">✗ Error: ${error.message}</p>`;
            }
        }

        // Initial log
        log('🎯 Cookie test page loaded');
        log('Current URL:', window.location.href);
        log('Document cookie string:', document.cookie || '(empty)');
    </script>
</body>
</html>
