<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Signup - Bid2Code</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
    <div class="header">
        <div class="container">
            <div class="header-content">
                <a href="/" class="logo">Bid2Code</a>
                <div class="nav-links">
                    <a href="/team/login" class="nav-link">Login</a>
                    <a href="/admin/login" class="nav-link">Admin</a>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="welcome-section">
            <h1>Join Bid2Code</h1>
            <p>Admin can create teams</p>
        </div>

        <div class="card" style="max-width: 500px; margin: 0 auto;">
            <div class="card-header">
                <h2 class="card-title">Team Registration</h2>
            </div>
            
            <form id="signupForm">
                <div class="form-group">
                    <label for="teamName" class="form-label">Team Name</label>
                    <input type="text" id="teamName" class="form-input" placeholder="Enter your team name" required>
                    <small>3-50 characters, unique team identifier</small>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Team Password</label>
                    <input type="password" id="password" class="form-input" placeholder="Create a password" required>
                    <small>Minimum 6 characters</small>
                </div>

                <div class="form-group">
                    <label for="confirmPassword" class="form-label">Confirm Team Password</label>
                    <input type="password" id="confirmPassword" class="form-input" placeholder="Confirm your password" required>
                </div>

                <div class="form-group" style="border-top: 2px solid #e2e8f0; padding-top: 1.5rem; margin-top: 1.5rem;">
                    <label for="adminPassword" class="form-label">Admin Password <span style="color: #f87171;">*</span></label>
                    <input type="password" id="adminPassword" class="form-input" placeholder="Enter admin password to register" required>
                    <small style="color: #94a3b8;">Only Admin can Create</small>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    Register Team
                </button>
            </form>

            <div class="mt-3 text-center">
                <p>Already have an account? <a href="/team/login" class="nav-link">Login here</a></p>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/auth.js"></script>
</body>
</html>
