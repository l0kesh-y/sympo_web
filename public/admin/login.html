<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Bid2Code</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
    <div class="header">
        <div class="container">
            <div class="header-content">
                <a href="/" class="logo">Bid2Code</a>
                <div class="nav-links">
                    <a href="/team/login" class="nav-link">Team Login</a>
                    <a href="/admin/login" class="nav-link">Admin</a>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="admin-header">
            <h1>Admin Portal</h1>
            <p>Manage the Bid2Code competition</p>
        </div>

        <div class="card" style="max-width: 500px; margin: 0 auto;">
            <div class="card-header">
                <h2 class="card-title">Administrator Login</h2>
            </div>
            
            <form id="adminLoginForm">
                <div class="form-group">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" id="username" class="form-input" placeholder="Enter admin username" required>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="Enter admin password" required>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    Access Admin Dashboard
                </button>
            </form>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/auth.js"></script>
</body>
</html>
